[pytest]
DJANGO_SETTINGS_MODULE = fsms.settings
pythonpath = .
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
markers =
    django_db: Tests that use the Django database
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests

