# Example nginx site for FSERP (Ubuntu). Adjust paths, domains, and TLS cert paths.
#
#   sudo cp deploy/nginx-fserp.example.conf /etc/nginx/sites-available/fserp
#   sudo ln -sf /etc/nginx/sites-available/fserp /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# PM2 must listen on:
#   backend  -> 127.0.0.1:8000  (ecosystem.config.js)
#   frontend -> 127.0.0.1:3000  (ecosystem.config.js)

# API (Django / Gunicorn)
server {
    listen 443 ssl http2;
    server_name api.mahasoftcorporation.com;

    ssl_certificate     /etc/letsencrypt/live/api.mahasoftcorporation.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.mahasoftcorporation.com/privkey.pem;

    client_max_body_size 256M;
    proxy_read_timeout 900s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 900s;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Frontend (Next.js)
server {
    listen 443 ssl http2;
    server_name mahasoftcorporation.com www.mahasoftcorporation.com;

    ssl_certificate     /etc/letsencrypt/live/mahasoftcorporation.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mahasoftcorporation.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name api.mahasoftcorporation.com mahasoftcorporation.com www.mahasoftcorporation.com;
    return 301 https://$host$request_uri;
}
